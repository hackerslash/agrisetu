name: agrisetu_app
description: "AgriSetu - Collective farming power for rural Indian farmers."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # UI & animations
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  pinput: ^5.0.0

  # Utilities
  intl: ^0.20.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  package_info_plus: ^8.1.2
  connectivity_plus: ^6.1.1
  collection: ^1.18.0
  equatable: ^2.0.7
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  path_provider: ^2.1.5
  record: ^6.1.1
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.3
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.3
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # Fonts are loaded via google_fonts package at runtime; no local TTF needed.
